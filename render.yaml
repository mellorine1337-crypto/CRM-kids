services:
  - type: web
    name: umiko-crm
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm install --include=dev && npm run prisma:generate --workspace backend && npm run build --workspace frontend
    startCommand: npm run start:render --workspace backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: umiko-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ATTENDANCE_QR_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PHONE
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: VITE_API_BASE_URL
        value: /api
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: noreply@umiko.app

databases:
  - name: umiko-db
    plan: free
    databaseName: umiko
